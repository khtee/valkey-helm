apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "valkey.fullname" . }}-init-scripts
  labels:
    {{- include "valkey.labels" . | nindent 4 }}
data:
  prestop.sh: |-
    # preStop hook to detect master role and request failover via Sentinel
    # This runs before the pod is terminated and uses the existing TLS/auth mounts.
    #!/bin/sh
    set -eu

    log() {
      echo "$(date +'%Y-%m-%dT%H:%M:%SZ') $*"
    }

    log "Starting Valkey preStop hook..."

    # Build TLS arguments only when TLS is enabled in the chart values.
    TLS_ARGS=""
    if [ "{{ .Values.tls.enabled }}" = "true" ]; then
      TLS_ARGS="--tls --cacert /tls/{{ .Values.tls.caPublicKey }}"
    fi

    # Function to fetch the password for a given Valkey username.
    # It checks mounted secrets in the order configured by the chart.
    get_password_for_user() {
      username="$1"
      password_key="${2:-$username}"

      if [ -f "/valkey-users-secret/$password_key" ]; then
        cat "/valkey-users-secret/$password_key"
        return 0
      fi
      if [ -f "/valkey-auth-secret/${username}-password" ]; then
        cat "/valkey-auth-secret/${username}-password"
        return 0
      fi
      return 1
    }

    # Determine the user used for ROLE queries and failover.
    # Prefer values from replica.sentinel if configured, otherwise fall back to default.
    ROLE_USERNAME="${VALKEY_MONITOR_USERNAME:-{{ .Values.replica.sentinel.monitorUser | default "default" }}}"
    SENTINEL_USERNAME="${VALKEY_SENTINEL_USERNAME:-{{ .Values.replica.sentinel.interSentinelUser | default "default" }}}"
    # Prepare auth args for the ROLE and Sentinel commands.
    ROLE_AUTH_ARGS=""
    SENTINEL_AUTH_ARGS=""
    if [ "{{ .Values.auth.enabled }}" = "true" ]; then
      if ROLE_PASSWORD=$(get_password_for_user "$ROLE_USERNAME"); then
        ROLE_AUTH_ARGS="--user $ROLE_USERNAME -a $ROLE_PASSWORD"
      else
        log "WARN: auth enabled but password for role user '$ROLE_USERNAME' was not found."
      fi
      if SENTINEL_PASSWORD=$(get_password_for_user "$SENTINEL_USERNAME"); then
        SENTINEL_AUTH_ARGS="--user $SENTINEL_USERNAME -a $SENTINEL_PASSWORD"
      else
        log "WARN: auth enabled but password for sentinel user '$SENTINEL_USERNAME' was not found."
      fi
    fi

    ROLE_OUTPUT=$(sh -c "valkey-cli ${TLS_ARGS} ${ROLE_AUTH_ARGS} -p {{ .Values.service.port }} ROLE" 2>/dev/null || true)
    ROLE=$(printf '%s' "$ROLE_OUTPUT" | head -n 1 | tr -d '"')
    log "Detected role: $ROLE"

    # If this node is currently master, request controlled failover from Sentinel.
    if [ "$ROLE" = "master" ]; then
      log "Pausing client writes for {{ .Values.replica.sentinel.clientPauseTimeout }} milliseconds..."
      sh -c "valkey-cli ${TLS_ARGS} ${ROLE_AUTH_ARGS} -p {{ .Values.service.port }} CLIENT PAUSE {{ .Values.replica.sentinel.clientPauseTimeout }} WRITE" >/dev/null 2>&1 || log "WARN: failed to pause client writes."
      
      log "Master node detected; requesting failover from Sentinel..."
      sh -c "valkey-cli ${TLS_ARGS} ${SENTINEL_AUTH_ARGS} -p {{ .Values.replica.sentinel.port }} SENTINEL failover {{ .Values.replica.sentinel.masterSet }}" >/dev/null 2>&1 || log "WARN: failed to invoke SENTINEL failover. Cluster may rely on automatic failover."
      
      log "Failover request completed."
    else
      log "Not master; skipping failover request."
    fi

  init.sh: |-
    #!/bin/sh
    set -eu

    # Default config paths
    VALKEY_CONFIG=${VALKEY_CONFIG_PATH:-/data/conf/valkey.conf}

    LOGFILE="/data/init.log"
    DATA_DIR="/data/conf"

    # Logging function (outputs to stderr and file)
    log() {
      echo "$(date) $1" | tee -a "$LOGFILE" >&2
    }

    {{- if .Values.auth.enabled }}
    # Function to get password for a user
    # Usage: get_user_password <username> [password_key]
    # Returns: password via stdout, exits with error if not found
    get_user_password() {
      username="$1"
      password_key="${2:-$username}"
      password=""

      {{- if .Values.auth.usersExistingSecret }}
      # Try to get password from existing secret first (priority)
      if [ -f "/valkey-users-secret/$password_key" ]; then
        password=$(cat "/valkey-users-secret/$password_key")
        log "Using password from existing secret for user $username"
      elif [ -f "/valkey-auth-secret/${username}-password" ]; then
        # Fallback to inline password
        password=$(cat "/valkey-auth-secret/${username}-password")
        log "Using inline password for user $username"
      else
        log "ERROR: No password found for user $username"
        return 1
      fi
      {{- else }}
      # Use inline password only
      if [ -f "/valkey-auth-secret/${username}-password" ]; then
        password=$(cat "/valkey-auth-secret/${username}-password")
        log "Using inline password for user $username"
      else
        log "ERROR: No password found for user $username"
        return 1
      fi
      {{- end }}

      echo "$password"
    }
    {{- end }}

    # Clean old log if requested
    if [ "${KEEP_OLD_LOGS:-false}" != "true" ]; then
      rm -f "$LOGFILE"
    fi

    if [ -f "$LOGFILE" ]; then
      log "Detected restart of this instance ($HOSTNAME)"
    fi

    log "Creating configuration in $DATA_DIR..."
    
    # Capture existing replication state if in Sentinel Mode
    SAVED_REPLICA_LINE=""
    if [ "${SENTINEL_MODE:-false}" = "true" ] && [ -f "$VALKEY_CONFIG" ]; then
      SAVED_REPLICA_LINE=$(grep "^replicaof" "$VALKEY_CONFIG" || true)
      if [ -n "$SAVED_REPLICA_LINE" ]; then
        log "Found existing replication config: '$SAVED_REPLICA_LINE'"
      fi
    fi

    mkdir -p "$DATA_DIR"
    rm -f "$VALKEY_CONFIG"


    # Base valkey.conf
    log "Generating base valkey.conf"
    {
{{- if .Values.tls.enabled }}
      echo "tls-cert-file /tls/{{ .Values.tls.serverPublicKey }}"
      echo "tls-key-file /tls/{{ .Values.tls.serverKey }}"
      echo "tls-ca-cert-file /tls/{{ .Values.tls.caPublicKey }}"
      {{- if .Values.tls.dhParamKey }}
      echo "tls-dh-params-file /tls/{{ .Values.tls.dhParamKey }}"
      {{- end }}
      {{- if not .Values.tls.requireClientCertificate }}
      echo "tls-auth-clients no"
      {{- end }}
      echo "port 0"
      echo "tls-port 6379"
{{- else }}
      echo "port 6379"
{{- end }}
      echo "protected-mode no"
      echo "bind * -::*"
      echo "dir /data"
    } >>"$VALKEY_CONFIG"

    {{- if .Values.replica.enabled }}
    # Announce configuration - required for Sentinel to discover and failover properly
    # All pods (master and replicas) must announce their resolvable hostname
    MY_HOSTNAME="{{ include "valkey.fullname" . }}-$POD_INDEX.{{ include "valkey.headlessServiceName" . }}.{{ .Release.Namespace }}.svc.{{ .Values.clusterDomain }}"
    log "Configuring announce-ip as $MY_HOSTNAME"
    {
      echo ""
      echo "# Announce configuration for Sentinel discovery"
      echo "replica-announce-ip $MY_HOSTNAME"
      echo "replica-announce-port {{ .Values.service.port }}"
    } >>"$VALKEY_CONFIG"
    {{- end }}

    {{- if .Values.auth.enabled }}
    # Create secure directory for ACL file
    log "Creating /etc/valkey directory for ACL file"
    mkdir -p /etc/valkey

    # Set aclfile path in valkey.conf
    echo "aclfile /etc/valkey/users.acl" >>"$VALKEY_CONFIG"

    # Remove or reset existing ACL file if present (it may be read-only from previous run)
    log "Preparing ACL file at /etc/valkey/users.acl"
    if [ -f /etc/valkey/users.acl ]; then
      log "Removing existing read-only users.acl file"
      chmod 0600 /etc/valkey/users.acl
      rm -f /etc/valkey/users.acl
    fi

    # Create ACL file with secure permissions
    touch /etc/valkey/users.acl
    chmod 0600 /etc/valkey/users.acl

    {{- if .Values.auth.aclUsers }}
    # Generate ACL entries for each user
    log "Generating ACL entries for users"
    {{- range $username, $user := .Values.auth.aclUsers }}
    {{- $passwordKey := $user.passwordKey | default $username }}

    # User: {{ $username }}
    PASSWORD=$(get_user_password "{{ $username }}" "{{ $passwordKey }}") || exit 1

    # Hash the password and write ACL entry
    PASSHASH=$(echo -n "$PASSWORD" | sha256sum | cut -f 1 -d " ")
    echo "user {{ $username }} on #$PASSHASH {{ $user.permissions }}" >> /etc/valkey/users.acl

    {{- end }}
    {{- end }}

    {{- if .Values.auth.aclConfig }}
    # Append inline ACL configuration
    log "Appending custom ACL configuration"
    if [ -f /valkey-auth-secret/aclConfig ]; then
      cat /valkey-auth-secret/aclConfig >> /etc/valkey/users.acl
    fi
    {{- end }}

    # Set final permissions
    chmod 0400 /etc/valkey/users.acl
    log "ACL file created with 0400 permissions"
    {{- end }}

    {{- if .Values.replica.enabled }}
    # Replica mode configuration
    log "Configuring replication mode"

    POD_INDEX=${POD_INDEX:-0}

    # 1. Determine Initial Topology or Restored State
    REPLICA_TARGET=""
    if [ "${SENTINEL_MODE:-false}" = "true" ]; then
      if [ -n "$SAVED_REPLICA_LINE" ]; then
        # CRITICAL: Restore topology written by Sentinel (CONFIG REWRITE)
        log "Sentinel Mode: Restoring replication state from previous run: $SAVED_REPLICA_LINE"
        REPLICA_TARGET="$SAVED_REPLICA_LINE"
      elif [ "$POD_INDEX" != "0" ]; then
        # Fresh boot: Initial cluster assembly. Nodes > 0 follow node 0.
        MASTER_HOST="{{ include "valkey.fullname" . }}-0.{{ include "valkey.headlessServiceName" . }}.{{ .Release.Namespace }}.svc.{{ .Values.clusterDomain }}"
        MASTER_PORT="{{ .Values.service.port }}"
        REPLICA_TARGET="replicaof $MASTER_HOST $MASTER_PORT"
        log "Sentinel Mode (Fresh): Node $POD_INDEX starting as replica of $MASTER_HOST"
      else
        log "Sentinel Mode (Fresh): Node 0 starting as initial MASTER"
      fi
    else
      # Standard Mode (Non-Sentinel)
      if [ "$POD_INDEX" != "0" ]; then
        MASTER_HOST="{{ include "valkey.fullname" . }}-0.{{ include "valkey.headlessServiceName" . }}.{{ .Release.Namespace }}.svc.{{ .Values.clusterDomain }}"
        MASTER_PORT="{{ .Values.service.port }}"
        REPLICA_TARGET="replicaof $MASTER_HOST $MASTER_PORT"
      fi
    fi

    # 2. Inject Replication Target
    if [ -n "$REPLICA_TARGET" ]; then
      echo "" >> "$VALKEY_CONFIG"
      echo "# Replication Target" >> "$VALKEY_CONFIG"
      echo "$REPLICA_TARGET" >> "$VALKEY_CONFIG"
    fi

    # 3. CRITICAL: Inject Replica Auth and TLS
    # In Sentinel mode, ALL nodes (even Node 0) must have these configured, 
    # as any node can be demoted to a replica dynamically.
    if [ -n "$REPLICA_TARGET" ] || [ "${SENTINEL_MODE:-false}" = "true" ]; then
      
      # General replica settings
      {
        {{- if .Values.replica.disklessSync }}
        echo ""
        echo "# Diskless replication"
        echo "repl-diskless-sync yes"
        echo "repl-diskless-sync-delay 5"
        {{- end }}
        echo ""
        echo "# Replica priority for Sentinel failover (lower = higher priority, 0 = never promote)"
        echo "replica-priority 100"
      } >>"$VALKEY_CONFIG"

      {{- if .Values.auth.enabled }}
      # Master authentication
      {{- $replUsername := .Values.replica.replicationUser }}
      {{- $replUser := index .Values.auth.aclUsers $replUsername }}
      {{- $replPasswordKey := $replUser.passwordKey | default $replUsername }}
      REPL_PASSWORD=$(get_user_password "{{ $replUsername }}" "{{ $replPasswordKey }}") || exit 1

      {
        echo ""
        echo "# Master authentication"
        echo "masterauth $REPL_PASSWORD"
        echo "masteruser {{ $replUsername }}"
      } >>"$VALKEY_CONFIG"
      log "Configured masterauth with user {{ $replUsername }}"
      {{- end }}

      {{- if .Values.tls.enabled }}
      # TLS for replication
      {
        echo ""
        echo "# TLS for replication"
        echo "tls-replication yes"
      } >>"$VALKEY_CONFIG"
      log "Enabled TLS for replication"
      {{- end }}
    fi

    {{- if gt (int .Values.replica.minReplicasToWrite) 0 }}
    # Write safety - require minimum healthy replicas
    {
      echo ""
      echo "# Minimum replicas for write operations"
      echo "min-replicas-to-write {{ .Values.replica.minReplicasToWrite }}"
      echo "min-replicas-max-lag {{ .Values.replica.minReplicasMaxLag }}"
    } >>"$VALKEY_CONFIG"
    log "Configured write safety: require {{ .Values.replica.minReplicasToWrite }} replicas with max {{ .Values.replica.minReplicasMaxLag }}s lag"
    {{- end }}
    {{- end }}
    # Append extra configs if present
    if [ -f /usr/local/etc/valkey/valkey.conf ]; then
      log "Appending /usr/local/etc/valkey/valkey.conf"
      cat /usr/local/etc/valkey/valkey.conf >>"$VALKEY_CONFIG"
    fi
    if [ -d /extravalkeyconfigs ]; then
      log "Appending files in /extravalkeyconfigs/"
      cat /extravalkeyconfigs/* >>"$VALKEY_CONFIG"
    fi
